services:
  - type: web
    name: realestate-agent
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir src
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
 
